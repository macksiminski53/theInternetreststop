<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markus the Music Pet &mdash; The Internet Rest Stop</title>
<style>
  html, body {
    margin: 0;
    overflow-x: hidden;
    max-width: 100%;
  }

  body {
    background: #ffffff;
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 12px;
  }

  .banner {
    background: #000080;
    color: #ffffff;
    padding: 4px 8px;
    font-size: 11px;
    text-align: center;
  }

  .headerBar {
    background: #C0C0C0;
    border-bottom: 1px solid #999999;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .headerBar .sitename {
    font-size: 18px;
    font-weight: bold;
    color: #800000;
    font-family: Georgia, 'Times New Roman', serif;
    text-decoration: none;
  }

  .headerBar a.backLink {
    font-size: 11px;
  }

  .pageWrap {
    max-width: 480px;
    margin: 24px auto;
    padding: 0 14px;
  }

  .pageTitle {
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 4px;
  }

  .pageSub {
    font-size: 11px;
    color: #555555;
    margin-bottom: 16px;
  }

  .petFrame {
    background: linear-gradient(180deg, #8fd3f4 0%, #b8e6fb 38%, #7bc96e 38%, #5cb85c 70%, #4a9e4a 100%);
    border: 1px solid #000000;
    border-radius: 4px;
    padding: 10px;
    position: relative;
    overflow: hidden;
  }

  .pfCloud {
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
    opacity: 0.9;
  }
  .pfCloud1 { width: 46px; height: 20px; top: 18px; left: 24px; }
  .pfCloud2 { width: 32px; height: 15px; top: 34px; right: 30px; }
  .pfCloud3 { width: 26px; height: 12px; top: 14px; right: 90px; }

  .pfFlower {
    position: absolute;
    bottom: 14px;
    width: 14px;
    height: 14px;
  }
  .pfFlower::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, #ffd93b 0 30%, transparent 31%),
      radial-gradient(circle at 50% 0%, #ff6b9d 0 45%, transparent 46%),
      radial-gradient(circle at 100% 50%, #ff6b9d 0 45%, transparent 46%),
      radial-gradient(circle at 50% 100%, #ff6b9d 0 45%, transparent 46%),
      radial-gradient(circle at 0% 50%, #ff6b9d 0 45%, transparent 46%);
  }
  .pfFlower1 { left: 20px; }
  .pfFlower2 { left: 250px; }
  .pfFlower3 { left: 60px; bottom: 8px; }
  .pfFlower4 { right: 40px; bottom: 10px; }

  /* ---- Markus the Music Pet (ported from MusicToDiscord's Electron build) ---- */
  :root {
    --divider: rgba(255,255,255,0.5);
    --indigo: #2b4fd6;
    --bad: #c0392b;
    --text-dim: #1a3d1a;
    --text: #12240f;
    --good: #35E38D;
    --bg2: #eafbe6;
    --accent: #2b4fd6;
  }

  #view-pet {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px;
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
    position: relative;
  }

  #pet-stage {
    position: relative;
    width: 200px;
    height: 180px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    margin-bottom: 8px;
    padding-bottom: 10px;
  }
  #pet-creature {
    animation: pet-bob 3s ease-in-out infinite;
    transform-origin: center bottom;
  }
  @keyframes pet-bob {
    0%, 100% { transform: translateY(0) scale(1, 1); }
    50%      { transform: translateY(-8px) scale(1.02, 0.98); }
  }

  #pet-friends {
    position: absolute;
    inset: 0;
    display: none;
    align-items: flex-end;
    justify-content: space-between;
    pointer-events: none;
  }
  body.pet-party #pet-friends { display: flex; }
  .pet-friend { flex-shrink: 0; }
  .friend-body { fill: #6b4226; transition: fill 0.3s; }
  .friend-ear { fill: #6b4226; }
  .friend-ear-inner { fill: #9b6b46; }
  .friend-snout { fill: #c4936b; }
  .friend-nose { fill: #2a1a0e; }
  .friend-mouth { stroke: #2a1a0e; }
  .friend-left {
    animation: friend-bounce-left 0.6s ease-in-out infinite;
    transform-origin: bottom center;
  }
  .friend-right {
    animation: friend-bounce-right 0.6s ease-in-out infinite 0.3s;
    transform-origin: bottom center;
  }
  @keyframes friend-bounce-left {
    0%, 100% { transform: rotate(-8deg) translateY(0); }
    50%      { transform: rotate(4deg) translateY(-8px); }
  }
  @keyframes friend-bounce-right {
    0%, 100% { transform: rotate(8deg) translateY(0); }
    50%      { transform: rotate(-4deg) translateY(-8px); }
  }
  body.pet-party #pet-creature {
    animation: pet-bob 0.5s ease-in-out infinite !important;
  }
  body.pet-party #pet-body,
  body.pet-party .pet-ear { fill: var(--good, #35E38D) !important; }

  #pet-body { fill: #8a5a2b; transition: fill 0.5s; }
  .pet-ear { fill: #8a5a2b; transition: fill 0.5s; }
  .pet-ear-inner { fill: #b3814f; }
  .pet-snout { fill: #d9b183; }
  .pet-nose { fill: #2a1a0e; }
  .pet-eye-dot { fill: #2a1a0e; }
  #pet-mouth { stroke: #2a1a0e; }

  .gear { display: none; }
  body.pet-vibing.vibe-hiphop .gear-hiphop,
  body.pet-vibing.vibe-rock .gear-rock,
  body.pet-vibing.vibe-pop .gear-pop,
  body.pet-vibing.vibe-rbsoul .gear-rbsoul,
  body.pet-vibing.vibe-electronic .gear-electronic,
  body.pet-vibing.vibe-jazz .gear-jazz,
  body.pet-vibing.vibe-classical .gear-classical,
  body.pet-vibing.vibe-country .gear-country { display: block; }

  body.pet-vibing #pet-creature {
    animation: pet-sway 0.9s ease-in-out infinite;
  }
  @keyframes pet-sway {
    0%, 100% { transform: rotate(-5deg) translateY(0); }
    50%      { transform: rotate(5deg) translateY(-3px); }
  }

  .shade-frame { fill: #f4f4f4; stroke: #cfcfcf; stroke-width: 1; }
  .shade-bridge { fill: #f4f4f4; }
  .shade-slat { stroke: #d0d0d0; stroke-width: 2.5; stroke-linecap: round; }

  body.pet-happy #pet-body,
  body.pet-happy .pet-ear { fill: #a06a30; }
  body.pet-sad #pet-body,
  body.pet-sad .pet-ear { fill: #6f6152; }
  body.pet-sick #pet-body,
  body.pet-sick .pet-ear { fill: #7d7a4a; }
  body.pet-sad #pet-mouth,
  body.pet-sick #pet-mouth { d: path("M 58 100 Q 70 92 82 100"); }
  body.pet-dead #pet-creature { filter: grayscale(1); animation: none; opacity: 0.6; }
  body.pet-dead #pet-mouth { d: path("M 58 100 Q 70 92 82 100"); }

  #pet-poop-layer { position: absolute; inset: 0; pointer-events: none; }
  .pet-poop {
    position: absolute;
    font-size: 20px;
    cursor: pointer;
    pointer-events: auto;
  }

  #pet-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  #pet-name { font-size: 20px; font-weight: 800; }
  #pet-rename-btn {
    background: none; border: none; color: var(--text-dim, #8E98AA);
    font-size: 11px; cursor: pointer; text-decoration: underline;
  }
  #pet-craving {
    font-size: 13px;
    color: var(--indigo, #5865F2);
    font-weight: 600;
    margin-bottom: 16px;
    text-align: center;
    min-height: 18px;
  }
  #pet-stats { width: 100%; max-width: 280px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .pet-stat { display: flex; align-items: center; gap: 10px; }
  .pet-stat-label { font-size: 12px; color: var(--text-dim, #8E98AA); width: 52px; }
  .pet-bar { flex: 1; height: 10px; background: var(--divider, #2A2E3A); border-radius: 5px; overflow: hidden; }
  .pet-bar-fill { height: 100%; background: var(--indigo, #5865F2); border-radius: 5px; transition: width 0.5s, background 0.5s; }
  .pet-bar-fill.low { background: var(--bad, #ED4245); }
  #pet-actions { display: flex; gap: 10px; }
  #pet-dead-msg { margin-top: 16px; font-size: 13px; color: var(--text-dim, #8E98AA); text-align: center; max-width: 260px; }

  .pill-btn {
    background: var(--indigo, #5865F2);
    color: #ffffff;
    border: none;
    border-radius: 14px;
    padding: 6px 16px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    font-family: Arial, Helvetica, sans-serif;
  }
  .pill-btn:hover { opacity: 0.9; }

  .aboutBox {
    margin-top: 16px;
    border: 1px solid #999999;
    background: #f4f4f4;
    padding: 10px;
    font-size: 11px;
    line-height: 1.5;
  }
  .aboutBox b { color: #800000; }

  .footerBar {
    text-align: center;
    font-size: 10px;
    color: #666666;
    padding: 14px;
  }
</style>
</head>
<body>

<div class="banner">theinternetreststop.com &mdash; pull over and stretch your legs</div>
<div class="headerBar">
  <a class="sitename" href="/">The Internet Rest Stop</a>
  <a class="backLink" href="/">&larr; Back to the Rest Stop</a>
</div>

<div class="pageWrap">
  <div class="pageTitle">Markus the Music Pet</div>
  <div class="pageSub">A little bear who eats music instead of food. Feed him, clean up after him, and don't let the music stop.</div>

  <div class="petFrame">
    <div class="pfCloud pfCloud1"></div>
    <div class="pfCloud pfCloud2"></div>
    <div class="pfCloud pfCloud3"></div>
    <div class="pfFlower pfFlower1"></div>
    <div class="pfFlower pfFlower2"></div>
    <div class="pfFlower pfFlower3"></div>
    <div class="pfFlower pfFlower4"></div>
    <div id="view-pet">
      <div id="pet-stage">
        <div id="pet-poop-layer"></div>
        <div id="pet-friends">

            <circle class="friend-ear" cx="24" cy="22" r="10"/>
            <circle class="friend-ear" cx="56" cy="22" r="10"/>
            <circle class="friend-ear-inner" cx="24" cy="22" r="5"/>
            <circle class="friend-ear-inner" cx="56" cy="22" r="5"/>
            <ellipse class="friend-body" cx="40" cy="48" rx="28" ry="24"/>
            <ellipse class="friend-snout" cx="40" cy="56" rx="14" ry="10"/>

            <path class="friend-mouth" d="M 33 60 Q 40 66 47 60" fill="none" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <svg class="pet-friend friend-right" viewBox="0 0 80 80" width="70" height="70">
            <circle class="friend-ear" cx="24" cy="22" r="10"/>
            <circle class="friend-ear" cx="56" cy="22" r="10"/>
            <circle class="friend-ear-inner" cx="24" cy="22" r="5"/>
            <circle class="friend-ear-inner" cx="56" cy="22" r="5"/>
            <ellipse class="friend-body" cx="40" cy="48" rx="28" ry="24"/>
            <ellipse class="friend-snout" cx="40" cy="56" rx="14" ry="10"/>
            <ellipse class="friend-nose" cx="40" cy="51" rx="4" ry="3"/>
            <path class="friend-mouth" d="M 33 60 Q 40 66 47 60" fill="none" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div id="pet-creature">
          <svg viewBox="0 0 140 140" width="150" height="150">
            <circle class="pet-ear" cx="38" cy="34" r="16"/>
            <circle class="pet-ear" cx="102" cy="34" r="16"/>
            <circle class="pet-ear-inner" cx="38" cy="34" r="8"/>
            <circle class="pet-ear-inner" cx="102" cy="34" r="8"/>
            <ellipse id="pet-body" cx="70" cy="72" rx="46" ry="42"/>

            <path id="pet-mouth" d="M 58 96 Q 70 104 82 96" fill="none" stroke-width="3" stroke-linecap="round"/>
            <g id="pet-shades">
              <rect class="shade-frame" x="30" y="52" width="80" height="22" rx="4"/>
              <rect class="shade-bridge" x="66" y="56" width="8" height="6"/>
              <line class="shade-slat" x1="33" y1="58" x2="63" y2="58"/>
              <line class="shade-slat" x1="33" y1="63" x2="63" y2="63"/>
              <line class="shade-slat" x1="33" y1="68" x2="63" y2="68"/>
              <line class="shade-slat" x1="77" y1="58" x2="107" y2="58"/>
              <line class="shade-slat" x1="77" y1="63" x2="107" y2="63"/>
              <line class="shade-slat" x1="77" y1="68" x2="107" y2="68"/>
            </g>
            <circle class="pet-eye-dot" cx="48" cy="63" r="2.5"/>
            <circle class="pet-eye-dot" cx="92" cy="63" r="2.5"/>
            <g id="pet-gear">

                <rect x="64" y="96" width="12" height="26" rx="6" fill="#2b2b2b"/>

                <ellipse cx="86" cy="118" rx="16" ry="13" fill="#c0392b" transform="rotate(-25 86 118)"/>
                <circle cx="86" cy="118" r="4" fill="#1a1a1a"/>
              </g>
              <g class="gear gear-pop">
                <rect x="65" y="98" width="10" height="24" rx="5" fill="#e84393"/>

              <g class="gear gear-rbsoul">
                <path d="M 66 96 L 66 116 Q 66 126 78 126 L 86 126" fill="none" stroke="#e0a021" stroke-width="6" stroke-linecap="round"/>
                <ellipse cx="88" cy="124" rx="8" ry="6" fill="#e0a021"/>

                <rect x="48" y="104" width="44" height="20" rx="4" fill="#2b2b2b"/>

                <circle cx="62" cy="114" r="2" fill="#ffd93b"/>
              </g>
              <g class="gear gear-jazz">
                <rect x="52" y="108" width="30" height="7" rx="3" fill="#e0a021"/>

              </g>
              <g class="gear gear-classical">
                <ellipse cx="70" cy="116" rx="13" ry="17" fill="#8a3b1e"/>

              </g>
              <g class="gear gear-country">
                <ellipse cx="76" cy="118" rx="15" ry="13" fill="#d9a441" transform="rotate(-20 76 118)"/>
                <circle cx="76" cy="118" r="5" fill="#7a5a20"/>
                <rect x="44" y="100" width="40" height="7" rx="2" transform="rotate(-20 63 103)" fill="#7a5a20"/>

            </g>
          </svg>
        </div>
      </div>
      <div id="pet-name-row">
        <span id="pet-name">Markus</span>
        <button id="pet-rename-btn" title="Rename">edit</button>
        <input id="pet-rename-input" type="text" maxlength="24" placeholder="New name..." style="display:none;width:110px;font-size:13px;padding:2px 6px;border-radius:6px;border:1px solid var(--accent);background:var(--bg2);color:var(--text);" />
