# Render Blueprint - lets you deploy both the web service and the
# database in one step via "New +" -> "Blueprint" in the Render dashboard.
databases:
  - name: reststop-db
    plan: free
    databaseName: reststop
    user: reststop

services:
  - type: web
    name: internet-rest-stop
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reststop-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
